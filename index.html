<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Timer & Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Syncopate:wght@400;700&family=Jost:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Task Timer</h1>
            <p>Design your time, track your focus.</p>
        </header>

        <main>
            <!-- メインタブヘッダー -->
            <div class="tabs-header" style="margin-bottom: 1rem;">
                <button id="main-tab-timer" class="main-tab-btn tab-btn active">タイマー</button>
                <button id="main-tab-stats" class="main-tab-btn tab-btn">履歴・集計</button>
            </div>

            <!-- タイマーセクション -->
            <section id="section-timer" class="card timer-section">
                <div class="task-input-group">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                        <label for="category-select" style="margin-bottom: 0;">タスクカテゴリ</label>
                        <button id="manage-categories-btn" class="btn-icon" title="カテゴリの編集" style="padding: 0;">⚙️</button>
                    </div>
                    <select id="category-select">
                        <!-- JS generated options -->
                    </select>
                </div>

                <div class="task-input-group" style="position: relative;">
                    <label for="task-input">現在のタスク</label>
                    <div style="display: flex; gap: 0.5rem; align-items: stretch;">
                        <input type="text" id="task-input" placeholder="例: 営業、プログラミング" autocomplete="off" style="flex: 1;">
                        <button id="task-history-btn" class="btn secondary" style="padding: 0; width: 3rem; display: flex; align-items: center; justify-content: center; font-size: 0.8rem;" title="直近の履歴から選択">▼</button>
                    </div>
                    <ul id="task-suggestions" class="autocomplete-list" style="display: none;"></ul>
                    <ul id="task-history-list" class="autocomplete-list" style="display: none;"></ul>
                </div>

                <div class="timer-display">
                    <span id="time-display">20:00</span>
                    <svg class="progress-ring" viewBox="0 0 240 240">
                        <defs>
                            <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#c07828" />
                                <stop offset="50%" stop-color="#dda040" />
                                <stop offset="100%" stop-color="#c07828" />
                            </linearGradient>
                        </defs>
                        <circle class="progress-ring__circle" stroke="url(#ringGradient)" stroke-width="8" fill="transparent" r="110" cx="120" cy="120"/>
                    </svg>
                </div>

                <div class="time-settings">
                    <div class="input-wrapper">
                        <input type="number" id="set-minutes" min="0" max="99" value="20">
                        <span>分</span>
                    </div>
                    <div class="input-wrapper">
                        <input type="number" id="set-seconds" min="0" max="59" value="0">
                        <span>秒</span>
                    </div>
                    <button id="apply-time-btn" class="btn secondary">設定</button>
                </div>

                <div class="controls">
                    <button id="start-btn" class="btn primary">Start</button>
                    <button id="pause-btn" class="btn warning" style="display: none;">Pause</button>
                    <button id="reset-btn" class="btn danger">Reset</button>
                </div>

                <div class="day-start-setting" style="margin-top: 0.8rem; text-align: center; border-top: 1px solid var(--border-color); padding-top: 0.5rem;">
                    <label for="day-start-time" style="font-size: 0.9rem; color: var(--text-secondary); margin-right: 0.5rem;">1日の開始時間:</label>
                    <input type="number" id="day-start-time" min="0" max="23" value="0" style="width: 60px; padding: 0.3rem; border: 1px solid var(--border-color); border-radius: 4px; background: var(--bg-primary); color: var(--text-primary); text-align: center;">
                    <span style="font-size: 0.9rem; color: var(--text-secondary);">時</span>
                    <p style="font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.2rem;">※ここで設定した時間から翌日の同じ時間までを「1日」として集計します</p>
                </div>
            </section>

            <!-- 履歴・集計セクション -->
            <section id="section-stats" class="card stats-section" style="display: none;">

                <!-- タブヘッダー -->
                <div class="tabs-header">
                    <button class="tab-btn active" data-tab="daily">単日集計</button>
                    <button class="tab-btn" data-tab="monthly">月間集計</button>
                    <button class="tab-btn" data-tab="history">履歴一覧</button>
                </div>

                <!-- 単日集計タブ内容 -->
                <div id="tab-daily" class="tab-content active">
                    <div class="date-selector">
                        <input type="date" id="date-input">
                    </div>
                </div>

                <!-- 月間集計タブ内容 -->
                <div id="tab-monthly" class="tab-content">
                    <div class="date-selector" style="display: flex; gap: 1rem; align-items: center; justify-content: center;">
                        <input type="month" id="month-input">
                        <button id="export-csv-btn" class="btn secondary" style="padding: 0.6rem 1rem; font-size: 0.85rem;" title="月間集計をCSVでダウンロード">📥 CSV出力</button>
                    </div>
                </div>

                <!-- 履歴タブ内容 -->
                <div id="tab-history" class="tab-content">
                    <div class="date-selector">
                        <input type="month" id="history-month-input">
                    </div>
                </div>

                <div class="stats-container">
                    <div id="stats-summary" class="stats-summary"></div>
                    <div id="stats-content">
                        <!-- 統計コンテンツがここに入ります -->
                    </div>
                </div>
            </section>
        </main>

        <!-- アラーム通知用カスタムモーダル (標準のalertの代わり) -->
        <div id="alarm-modal" class="modal-overlay" style="display: none;">
            <div class="modal-content">
                <h2 id="alarm-title">お疲れ様でした！</h2>
                <p id="alarm-message">タスクが完了しました。</p>
                <div class="modal-actions">
                    <button id="alarm-stop-btn" class="btn primary">OK（音を止める）</button>
                </div>
            </div>
        </div>

        <!-- 編集用カスタムモーダル (標準のpromptの代わり) -->
        <div id="edit-modal" class="modal-overlay" style="display: none;">
            <div class="modal-content">
                <h2 id="edit-title">名前の変更</h2>
                <input type="text" id="edit-input" style="width: 100%; margin-bottom: 1.5rem; text-align: left;">
                <div class="modal-actions" style="gap: 1rem;">
                    <button id="edit-cancel-btn" class="btn secondary">キャンセル</button>
                    <button id="edit-save-btn" class="btn primary">保存</button>
                </div>
            </div>
        </div>

        <!-- カテゴリ管理モーダル -->
        <div id="category-modal" class="modal-overlay" style="display: none;">
            <div class="modal-content">
                <h2>カテゴリの管理</h2>
                <div style="display: flex; gap: 0.5rem; margin-bottom: 1rem;">
                    <input type="text" id="new-category-input" placeholder="新しいカテゴリ名" style="flex: 1; min-width: 0;">
                    <button id="add-category-btn" class="btn primary" style="padding: 0; width: 3.2rem; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;" title="リストに追加">⬇️</button>
                </div>
                <ul id="category-manager-list" class="stats-list" style="max-height: 200px; overflow-y: auto; margin-bottom: 1.5rem; border: 1px solid var(--border-color); border-radius: 8px; padding: 0.5rem; text-align: left;">
                </ul>
                <div class="modal-actions">
                    <button id="category-close-btn" class="btn secondary">閉じる</button>
                </div>
            </div>
        </div>

        <!-- タスク詳細編集・移動モーダル -->
        <div id="edit-task-modal" class="modal-overlay" style="display: none;">
            <div class="modal-content">
                <h2 id="edit-task-title">タスクの編集・移動</h2>
                <div class="task-input-group" style="text-align: left; margin-bottom: 1rem;">
                    <label>カテゴリ</label>
                    <select id="edit-task-category-select" style="width: 100%;"></select>
                </div>
                <div class="task-input-group" style="text-align: left; margin-bottom: 1.5rem;">
                    <label>タスク名</label>
                    <input type="text" id="edit-task-name-input" style="width: 100%;">
                </div>
                <div class="modal-actions" style="gap: 1rem;">
                    <button id="edit-task-cancel-btn" class="btn secondary">キャンセル</button>
                    <button id="edit-task-save-btn" class="btn primary">保存</button>
                </div>
            </div>
        </div>

        <!-- 時間調整用モーダル -->
        <div id="edit-time-modal" class="modal-overlay" style="display: none;">
            <div class="modal-content">
                <h2 id="edit-time-title">合計時間の修正</h2>
                <p id="edit-time-current" style="margin-bottom: 1rem; color: var(--text-secondary);">現在の合計時間: 0分</p>
                <div class="task-input-group" style="text-align: left; margin-bottom: 1.5rem;">
                    <label>新しい合計時間 (分)</label>
                    <input type="number" id="edit-time-input" min="0" style="width: 100%;">
                </div>
                <div class="modal-actions" style="gap: 1rem;">
                    <button id="edit-time-cancel-btn" class="btn secondary">キャンセル</button>
                    <button id="edit-time-save-btn" class="btn primary">保存</button>
                </div>
            </div>
        </div>

    </div>

    <!-- アラーム音用のオーディオ要素 -->
    <audio id="alarm-audio" loop preload="auto">
        <source src="レジ.mp3" type="audio/mpeg">
        <source src="レジ.wav" type="audio/wav">
    </audio>

    <script src="script.js"></script>
</body>
</html>
